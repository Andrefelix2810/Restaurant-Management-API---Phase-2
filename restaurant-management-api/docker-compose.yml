services:
  postgres:
    image: postgres:16-alpine
    container_name: restaurant_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-restaurant_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-restaurant_db}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - restaurant-net

  app:
    build: .
    container_name: restaurant_management_api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-restaurant_db}
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "8080:8080"
    networks:
      - restaurant-net

networks:
  restaurant-net:
    driver: bridge

volumes:
  postgres_data: